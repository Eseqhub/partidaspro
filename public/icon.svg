<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a1428"/>
      <stop offset="1" stop-color="#020810"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.42" r="0.6">
      <stop offset="0" stop-color="#ccff00" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#ccff00" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Fundo maskable (preenche tudo) -->
  <rect width="512" height="512" fill="url(#bg)"/>
  <rect width="512" height="512" fill="url(#glow)"/>

  <!-- Bola de futebol estilizada -->
  <g transform="translate(256 230)">
    <circle r="120" fill="none" stroke="#ccff00" stroke-width="14"/>
    <!-- Pentágono central -->
    <path d="M0 -52 L49 -16 L30 42 L-30 42 L-49 -16 Z" fill="#ccff00"/>
    <!-- Costuras -->
    <path d="M0 -52 L0 -120 M49 -16 L108 -40 M30 42 L66 96 M-30 42 L-66 96 M-49 -16 L-108 -40"
          stroke="#ccff00" stroke-width="11" stroke-linecap="round"/>
  </g>

  <!-- Wordmark -->
  <text x="256" y="430" text-anchor="middle"
        font-family="Arial, sans-serif" font-size="64" font-weight="900"
        letter-spacing="2" fill="#ffffff">PRO</text>
</svg>
