<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a1428"/>
      <stop offset="1" stop-color="#020810"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.6">
      <stop offset="0" stop-color="#ccff00" stop-opacity="0.14"/>
      <stop offset="1" stop-color="#ccff00" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Fundo maskable -->
  <rect width="512" height="512" fill="url(#bg)"/>
  <rect width="512" height="512" fill="url(#glow)"/>

  <!-- Campo minimalista + time posicionado -->
  <g fill="none" stroke="#ccff00">
    <rect x="146" y="96" width="220" height="320" rx="46" stroke-width="16" opacity="0.9"/>
    <line x1="146" y1="256" x2="366" y2="256" stroke-width="11" opacity="0.5"/>
    <circle cx="256" cy="256" r="44" stroke-width="11" opacity="0.5"/>
  </g>
  <g fill="#ccff00">
    <circle cx="206" cy="330" r="20"/>
    <circle cx="306" cy="330" r="20"/>
    <circle cx="256" cy="378" r="20"/>
  </g>
</svg>
